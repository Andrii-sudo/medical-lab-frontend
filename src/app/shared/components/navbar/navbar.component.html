<button 
    class="btn-navbar-open" 
    [class.hide]="isOpen"
    aria-label="Відкрити меню" 
    (click)="openMenu()"><img src="/icons/menu.svg" alt="Меню"></button>

<nav [class.open]="isOpen">
    <button class="btn-navbar-close" (click)="closeMenu()">&#8592;</button>
    <ul class="nav-links">
        <li><a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">Інформаційна панель</a></li>
        <li><a routerLink="/patients"  routerLinkActive="active" (click)="closeMenu()">Пацієнти</a></li>
        <li><a routerLink="/orders"    routerLinkActive="active" (click)="closeMenu()">Замовлення</a></li>
        <li><a routerLink="/samples"   routerLinkActive="active" (click)="closeMenu()">Зразки</a></li>
        <li><a routerLink="/results"   routerLinkActive="active" (click)="closeMenu()">Результати</a></li>
    </ul>

    <div class="nav-footer">
        <div class="current-office">
            <span class="office-label">Поточне відділення:</span>
            <span class="office-value">{{ currentOffice }}</span>
        </div>
        
        <button class="btn-logout" (click)="logout()">
            Вийти
        </button>
    </div>
</nav>
