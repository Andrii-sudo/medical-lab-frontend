<div class="backdrop" (click)="onDialogCancel()"></div>
<dialog open>
    <div class="dialog-header">
        <h3 class="dialog-title">{{ title }}</h3>
        <button class="dialog-close" aria-label="Закрити" (click)="onDialogCancel()">&#10006;</button>
    </div>
    <p class="dialog-description">{{ description }}</p>
    <div class="dialog-actions">
        <button class="dialog-cancel" (click)="onDialogCancel()">{{ cancelText }}</button>
        <button class="dialog-confirm" (click)="onDialogConfirm()">{{ confirmText }}</button>
    </div>
</dialog>
